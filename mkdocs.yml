site_name: SpeechSense
repo_url: https://github.com/SpeechSense/SpeechSense
site_url: https://speechsense.github.io/SpeechSense
site_description: A speech processing pipeline
site_author: SpeechSense
edit_uri: edit/main/docs/
repo_name: SpeechSense/SpeechSense

nav:
  - Home: index.md
  - Report: report.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append('../')
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SpeechSense/SpeechSense
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/SpeechSense

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
